<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Detalles</title>
    </head>

    <body>
        <h1 th:text="'Detalles del estudiante: '+ ${estudiante.Nombre}+ ' '+ ${estudiante.primerApellido}+ ' ' + ${estudiante.segundoApellido}"></h1>
        <h2 th:text="'Facultad: '+ ${estudiante.facultad.Nombre}"></h2>

        <div th:if="${estudiante.correos.size > 0}">
            <h2>Correos</h2>
            <ul>
                <li th:each="correo : ${estudiante.correos}" th:text="${correo.direccion}"></li>
            </ul>
        </div>

        <div th:if="${estudiante.telefonos.size > 0}">
            <h2>Telefonos</h2>
            <ul>
                <li th:each="telefono : ${estudiante.telefonos}" th:text="${telefono.numero}"></li>
            </ul>
        </div>

        <div th:if="${estudiante.foto != null}">
            <h2>Foto del Empleado</h2>
            <img th:src ="@{/imagenes/} + ${estudiante.foto}">
        </div>

        <a th:href="@{/estudiantes/listar}">Volver</a>
    </body>
</html>
